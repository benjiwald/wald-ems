<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site_name }} — EMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { 1: '#1a2332', 2: '#0f1923' },
            border: '#2a3344',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    .glow { box-shadow: 0 0 20px rgba(26, 230, 140, 0.15); }
  </style>
</head>
<body class="bg-[#0a0f18] text-gray-200 min-h-screen">
  <!-- Header -->
  <header class="border-b border-gray-800/50 px-4 py-3">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="h-2 w-2 rounded-full bg-green-400 animate-pulse"></div>
        <h1 class="text-lg font-bold text-white">{{ site_name }}</h1>
        <span class="text-[10px] text-gray-500 mono">v{{ version|default('?') }}</span>
      </div>
      <nav class="flex gap-1">
        <a href="/" class="px-3 py-1.5 text-xs font-medium rounded-lg {% if request.url.path == '/' %}bg-white/10 text-white{% else %}text-gray-400 hover:text-white{% endif %}">Dashboard</a>
        <a href="/sessions" class="px-3 py-1.5 text-xs font-medium rounded-lg {% if request.url.path == '/sessions' %}bg-white/10 text-white{% else %}text-gray-400 hover:text-white{% endif %}">Sessions</a>
        <a href="/settings" class="px-3 py-1.5 text-xs font-medium rounded-lg {% if request.url.path == '/settings' %}bg-white/10 text-white{% else %}text-gray-400 hover:text-white{% endif %}">Settings</a>
      </nav>
    </div>
  </header>

  <!-- Content -->
  <main class="max-w-2xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <!-- WebSocket Auto-Update -->
  <script src="/static/app.js"></script>
</body>
</html>
